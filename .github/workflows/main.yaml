name: test flux-operator

on:
  pull_request: {}

jobs:
  formatting:
    name: Formatting
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup black linter
      run: conda create --quiet --name black pyflakes

    - name: Check Spelling
      uses: crate-ci/typos@7ad296c72fa8265059cc03d1eda562fbdfcd6df2 # v1.9.0
      with:
        files: ./docs/*/*.md ./docs/*/*/*.md ./docs/*.md ./README.md ./docs/*.md

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Setup Go
      uses: actions/setup-go@v3
      with:
        go-version: ^1.23
    - name: fmt check
      run: make fmt

    - name: Install zeromq
      run: sudo apt-get update && sudo apt-get install -y libsodium-dev libzmq3-dev libczmq-dev

    - name: Check Updated flux-operator-arm.yaml
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        cp examples/dist/flux-operator-arm.yaml /tmp/flux-operator-arm.yaml
        make build-config-arm
        diff examples/dist/flux-operator-arm.yaml /tmp/flux-operator-arm.yaml

    # Ensure build-config is the same as the one we have
    - name: Check Updated flux-operator.yaml
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        cp examples/dist/flux-operator.yaml /tmp/flux-operator.yaml
        make build-config
        diff examples/dist/flux-operator.yaml /tmp/flux-operator.yaml

  test-jobs:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # matrix remains the same
        test: [["post", "", 100],
               ["batch", "", 100],
               ["timed", "", 100],
               ["debug", "", 100],
               # We need minikube for volumes, disable for now
               # ["volumes", "", 100],
               ["hello-world", "", 100],
               ["nginx-service", "", 100],
               ["custom-config", "", 100],
               ["minimal-service", "", 100],               
               # ["existing-volumes", "", 100],
               ["flux-resource-list", "", 100],
               ["nginx-sidecar-service", "", 100],
               ["pokemon", "ghcr.io/rse-ops/pokemon:app-latest", 100],
               ["snakemake", "ghcr.io/rse-ops/atacseq:app-latest", 100],
               ["singularity", "ghcr.io/rse-ops/singularity:tag-mamba", 100],
               ["lammps", "ghcr.io/converged-computing/metric-lammps:latest", 100],
               ["disable-view", "ghcr.io/rse-ops/lammps:flux-sched-focal", 100]]

    steps:
    - name: Clone the code
      uses: actions/checkout@v4

    - name: Setup Go
      uses: actions/setup-go@v4
      with:
        go-version: ^1.23

    - name: Install zeromq
      run: sudo apt-get update && sudo apt-get install -y libsodium-dev libzmq3-dev libczmq-dev

    # 1. Create the Kind cluster
    - name: Create Kind Cluster
      uses: helm/kind-action@v1.12.0
      with:
        cluster_name: kind

    # 2. Build and Load Images
    - name: Prepare Images and Deploy
      env:
        container: ${{ matrix.test[1] }}
        test: ${{ matrix.test[0] }}
      run: |
        # Pull required base images to the host
        docker pull ghcr.io/converged-computing/flux-view-ubuntu:tag-noble
        if [[ "${container}" != "" ]]; then docker pull ${container}; fi
        if [[ "${test}" == "nginx-service" ]]; then docker pull nginx; fi

        # Load these images into Kind (makes them available to the cluster)
        kind load docker-image ghcr.io/converged-computing/flux-view-ubuntu:tag-noble
        if [[ "${container}" != "" ]]; then kind load docker-image ${container}; fi
        if [[ "${test}" == "nginx-service" ]]; then kind load docker-image nginx; fi

        # Build the local operator image
        make deploy-local 
        
        # Load the operator image into Kind
        kind load docker-image ghcr.io/flux-framework/flux-operator:test

        # Apply the manifests
        kubectl apply -f examples/dist/flux-operator-local.yaml

    - name: Test ${{ matrix.test[0] }}
      env:
        name: ${{ matrix.test[0] }}
        jobtime: ${{ matrix.test[2] }}
      run: /bin/bash ./script/test.sh ${name} ${jobtime}
